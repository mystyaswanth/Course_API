<div class="card shadow-lg form-card">

<div class="card-header">
Add Course
</div>

<div class="card-body">

<form (ngSubmit)="saveCourse()">

<div class="mb-3">
<label>Course ID</label>
<input type="number" [(ngModel)]="course.courseid" name="courseid" class="form-control">
</div>

<div class="mb-3">
<label>Course Name</label>
<input type="text" [(ngModel)]="course.coursename" name="coursename" class="form-control">
</div>

<div class="mb-3">
<label>Instructor</label>
<input type="text" [(ngModel)]="course.instructor" name="instructor" class="form-control">
</div>

<div class="mb-3">
<label>Credits</label>
<input type="number" [(ngModel)]="course.credits" name="credits" class="form-control">
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" [(ngModel)]="course.department" name="department" class="form-control">
</div>

<button class="btn btn-success w-100">
Save Course
</button>

</form>

</div>

</div>
